schema: 1
name: bash
version: 1.0.0
description: GNU Bourne-Again Shell (native Linux/macOS, WSL, MSYS2, Git Bash)
homepage: https://www.gnu.org/software/bash/
license: GPL-3.0-or-later
family: shell

aliases:
  - sh

process:
  # Candidate list tried left-to-right; first entry that resolves to an
  # existing file wins. On Windows, a bare `bash` resolves via registry
  # PATH, which hits C:\Windows\System32\bash.exe — WSL's launcher — and
  # that exits ~150ms after CreateProcess when no WSL distribution is
  # installed (wsl.exe prints "no installed distributions" to stderr and
  # bails). Most developer workstations have Git for Windows installed
  # but don't have a WSL distro, so prefer Git Bash first and fall back
  # to WSL only if Git isn't present. MSYS2 is a tertiary fallback for
  # users who installed it directly. The bare `bash` fallback covers
  # Linux / macOS where it's the canonical PATH entry.
  executable_candidates:
    # Git for Windows bundled bash — canonical dev workstation bash on
    # Windows. Runs as a native MSYS2 binary, no distro required.
    - 'C:\Program Files\Git\bin\bash.exe'
    # MSYS2 standalone install.
    - 'C:\msys64\usr\bin\bash.exe'
    # PATH search — wins on Linux / macOS and on Windows boxes where a
    # distro-providing bash is explicitly exposed. On Windows without
    # Git / MSYS2 this falls through to WSL bash, which requires an
    # installed distribution to survive startup.
    - bash
    # Linux / BSD system bash.
    - /bin/bash
    - /usr/bin/bash
  command_template: '"{shell_path}" --login -i'
  inherit_environment: true
  env: {}
  encoding: utf-8
  line_ending: "\n"

ready:
  wait_for_event: prompt_start
  timeout_ms: 0
  settle_before_inject_ms: 2000
  suppress_mirror_during_inject: true
  kick_enter_after_ready: true
  delay_after_inject_ms: 500

init:
  strategy: shell_integration
  hook_type: ps0
  delivery: pty_inject
  script_resource: integration.bash

prompt:
  strategy: shell_integration
  shell_integration:
    protocol: osc633
    property_updates:
      cwd_key: Cwd

output:
  post_prompt_settle_ms: 50
  strip_ansi: false
  strip_input_echo: true
  input_echo_strategy: osc_boundaries
  line_ending: "\n"

input:
  line_ending: "\n"
  multiline_detect: prompt_based
  # Multi-line delivery for bash is handled by ConsoleWorker's
  # hardcoded isMultiLinePosix branch (pre-schema legacy), which
  # writes the body to a .sh tempfile and dot-sources it. The
  # schema's generic multiline_delivery: tempfile dispatch never
  # reaches bash, but declaring it here keeps the yaml honest
  # about what actually happens at runtime.
  multiline_delivery: tempfile
  chunk_delay_ms: 0
  # bash's interactive line editor is GNU readline in emacs mode
  # (the default unless the user puts `set -o vi` in .inputrc or
  # .bashrc). Ctrl-A = beginning-of-line, Ctrl-K = kill-line — both
  # are no-ops on an empty buffer, so sending "\x01\x0b" before each
  # AI command is safe and wipes any keystrokes the user typed into
  # ripple's window while it was (briefly) focused. vi-mode users
  # will experience the bytes as mode-change keystrokes, which is
  # harmless but unsubtle — documented caveat.
  clear_line: "\u0001\u000b"

signals:
  interrupt: "\x03"
  eof: "\x04"
  suspend: "\x1a"

lifecycle:
  ready_timeout_ms: 0
  shutdown:
    command: "exit"
    grace_ms: 1000
    force_signal: kill
  restart_on: [crash]

capabilities:
  stateful: true
  interrupt: true
  meta_commands: false
  auto_modes: false
  async_output: false
  exit_code: true
  cwd_tracking: true
  cwd_format: posix
  job_control: true
  shell_integration: osc633
  user_busy_detection: osc_b

probe:
  eval: "echo $((1 + 1))"
  expect: '^2$'

tests:
  - name: simple_arithmetic
    eval: "echo $((2 + 3))"
    expect: '^5$'
  - name: variable_persistence
    setup: "x=42"
    eval: "echo $((x * 2))"
    expect: '^84$'
  - name: multiline_function
    eval: |
      double() { echo $(($1 * 2)); }
      double 21
    expect: '^42$'
  - name: cwd_change_tracked
    setup: "cd /tmp"
    eval: "pwd"
    expect_cwd_update: true
  - name: exit_code_propagates
    eval: "false"
    expect_exit_code: 1

