schema: 1
name: pwsh
version: 1.0.0
description: PowerShell 7+ (and Windows PowerShell 5.1 via `powershell` alias)
homepage: https://github.com/PowerShell/PowerShell
license: MIT
family: shell

aliases:
  - powershell

process:
  command_template: '"{shell_path}" -NoExit -Command "{init_invocation}"'
  inherit_environment: false
  env:
    POWERSHELL_TELEMETRY_OPTOUT: "1"
  encoding: utf-8
  line_ending: "\r"

ready:
  wait_for_event: prompt_start
  timeout_ms: 0
  settle_before_inject_ms: 0
  kick_enter_after_ready: false

init:
  strategy: shell_integration
  hook_type: precommand_lookup_action
  delivery: launch_command
  tempfile:
    prefix: .ripple-integration-
    extension: .ps1
  init_invocation_template: "Import-Module PSReadLine -ErrorAction SilentlyContinue; . '{tempfile_path}'; Remove-Item '{tempfile_path}' -ErrorAction SilentlyContinue"
  script_resource: integration.ps1
  banner_injection:
    mode: prepend_to_tempfile
    banner_template: |
      Write-Host '{banner}' -ForegroundColor Green
    reason_template: |
      Write-Host 'Reason: {reason}' -ForegroundColor DarkYellow

prompt:
  strategy: shell_integration
  shell_integration:
    protocol: osc633
    markers:
      prompt_start: "\x1b]633;A\x07"
      command_input_start: "\x1b]633;B\x07"
      command_executed: "\x1b]633;C\x07"
      command_finished: "\x1b]633;D\x07"
      property_update: "\x1b]633;P\x07"
    property_updates:
      cwd_key: Cwd

output:
  post_prompt_settle_ms: 0
  strip_ansi: false
  strip_input_echo: true
  input_echo_strategy: osc_boundaries
  line_ending: "\r\n"

input:
  line_ending: "\r"
  multiline_detect: prompt_based
  multiline_delivery: tempfile
  tempfile:
    prefix: .ripple-exec-
    extension: .ps1
    path_template: "{temp_dir}/.ripple-exec-{pid}-{guid}.ps1"
    invocation_template: ". '{path}'; Remove-Item '{path}' -ErrorAction SilentlyContinue"
    history_filter: '\.ripple-exec-.*\.ps1'
    cleanup_on_start: true
    stale_ttl_hours: 24

signals:
  interrupt: "\x03"
  eof: "\x04"
  suspend: null

lifecycle:
  ready_timeout_ms: 0
  shutdown:
    command: "exit"
    grace_ms: 1000
    force_signal: kill
  restart_on: [crash]

capabilities:
  stateful: true
  interrupt: true
  meta_commands: false
  auto_modes: false
  async_output: false
  exit_code: true
  cwd_tracking: true
  cwd_format: windows_native
  job_control: false
  shell_integration: osc633
  user_busy_detection: osc_b

probe:
  eval: "1 + 1"
  expect: '^2$'

tests:
  - name: simple_arithmetic
    eval: "2 + 3"
    expect: '^5$'
  - name: variable_persistence
    setup: "$x = 42"
    eval: "$x * 2"
    expect: '^84$'
  - name: multiline_function
    eval: |
      function double { param($x) $x * 2 }
      double 21
    expect: '^42$'
  - name: error_surfaces_nonzero_exit
    # PowerShell cmdlet errors (Get-Item /nope) only set $? and write
    # to the error stream; they do NOT update $LASTEXITCODE, so
    # ripple's OSC D;0 path reports exit 0 even on failure. Use a
    # native command instead so the non-zero exit actually propagates
    # via the integration's prompt-function read of $LASTEXITCODE.
    eval: "cmd /c exit 7"
    expect_exit_code: 7
    expect_error: true
  - name: cwd_change_tracked
    setup: "Set-Location $env:TEMP"
    eval: "$PWD.Path"
    expect_cwd_update: true

