schema: 1
name: zsh
version: 1.0.0
description: Z Shell
homepage: https://www.zsh.org/
license: MIT
family: shell

process:
  command_template: '"{shell_path}" -l -i'
  inherit_environment: true
  env: {}
  encoding: utf-8
  line_ending: "\n"

ready:
  wait_for_event: prompt_start
  timeout_ms: 0
  settle_before_inject_ms: 2000
  suppress_mirror_during_inject: true
  kick_enter_after_ready: true
  delay_after_inject_ms: 500

init:
  strategy: shell_integration
  hook_type: preexec
  # rc_file delivery: ripple writes integration.zsh as .zshrc into a
  # per-worker temp dir and exports ZDOTDIR into the child environment
  # before CreateProcess. zsh reads $ZDOTDIR/.zshrc as part of its own
  # startup, so the precmd / preexec hooks are registered by the time
  # the first prompt is drawn — OSC 633 A fires naturally without any
  # PTY-side source command. This is the only reliable delivery mode
  # for MSYS2 zsh under ConPTY: pty_inject hangs forever because ZLE
  # buffers the injected bytes without treating \n or \r\n as Enter.
  delivery: rc_file
  rc_file:
    dir_env_var: ZDOTDIR
    file_name: .zshrc
  script_resource: integration.zsh

prompt:
  strategy: shell_integration
  shell_integration:
    protocol: osc633
    property_updates:
      cwd_key: Cwd

output:
  post_prompt_settle_ms: 50
  strip_ansi: false
  strip_input_echo: true
  input_echo_strategy: osc_boundaries
  line_ending: "\n"

input:
  line_ending: "\n"
  multiline_detect: prompt_based
  # Multi-line delivery for zsh is handled by ConsoleWorker's
  # hardcoded isMultiLinePosix branch (pre-schema legacy), which
  # writes the body to a .sh tempfile and dot-sources it. The
  # schema's generic multiline_delivery: tempfile dispatch never
  # reaches zsh, but declaring it here keeps the yaml honest
  # about what actually happens at runtime.
  multiline_delivery: tempfile
  # zsh's default ZLE binding (zsh-line-editor) is emacs-style
  # without requiring `bindkey -e`, with Ctrl-A bound to
  # beginning-of-line and Ctrl-K bound to kill-line. Sending
  # "\x01\x0b" before each AI command wipes any keystrokes the
  # user typed into ripple's window while it was focused;
  # no-op on an empty buffer. Users who have explicitly run
  # `bindkey -v` (vi-mode) see the bytes as keystroke sequences
  # that are harmless but may surprise them — documented caveat.
  clear_line: "\u0001\u000b"

signals:
  interrupt: "\x03"
  eof: "\x04"
  suspend: "\x1a"

lifecycle:
  shutdown:
    command: "exit"
    grace_ms: 1000
    force_signal: kill
  restart_on: [crash]

capabilities:
  stateful: true
  interrupt: true
  meta_commands: false
  auto_modes: false
  async_output: false
  exit_code: true
  cwd_tracking: true
  cwd_format: posix
  job_control: true
  shell_integration: osc633
  user_busy_detection: osc_b

probe:
  eval: "echo $((1 + 1))"
  expect: '^2$'

tests:
  - name: simple_arithmetic
    eval: "echo $((2 + 3))"
    expect: '^5$'
  - name: variable_persistence
    setup: "x=42"
    eval: "echo $((x * 2))"
    expect: '^84$'
  - name: cwd_change_tracked
    setup: "cd /tmp"
    eval: "pwd"
    expect_cwd_update: true
  - name: exit_code_propagates
    eval: "false"
    expect_exit_code: 1

